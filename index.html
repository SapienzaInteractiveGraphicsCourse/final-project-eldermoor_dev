<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Eldermoor</title>
  <link rel="stylesheet" href="style.css">

  <!-- Decorative font for the game title -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@500&display=swap" rel="stylesheet">

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/"
    }
  }
  </script>

  <style>
    #menu, #loading {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background-size: cover; background-position: center;
      color: #f3e7c8; text-align: center;
      transition: opacity .8s ease;
    }
    #menu { background-image: url('./loading_images/loading_1.png'); }
    #menu::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,.25) 0%, rgba(0,0,0,.15) 40%, rgba(0,0,0,.55) 100%);
    }
    #menu > * { position: relative; z-index: 1; }
    #game-title {
      font-family: 'Cinzel Decorative', serif; font-weight: 900;
      font-size: clamp(48px, 11vw, 140px); letter-spacing: .06em;
      margin: 0 0 6px 0; color: #f6e9c6;
      text-shadow: 0 2px 0 #3a2a14, 0 0 18px rgba(0,0,0,.7), 0 6px 30px rgba(0,0,0,.8);
    }
    #game-subtitle {
      font-family: 'Cinzel', serif; font-size: clamp(13px, 2vw, 20px);
      letter-spacing: .35em; text-transform: uppercase; color: #d8c79a;
      margin-bottom: 48px; text-shadow: 0 2px 8px rgba(0,0,0,.8);
    }
    #play-btn {
      font-family: 'Cinzel', serif; font-size: clamp(18px, 2.4vw, 26px);
      letter-spacing: .15em; text-transform: uppercase; color: #f6e9c6;
      background: linear-gradient(180deg, rgba(120,86,46,.92), rgba(72,50,26,.95));
      border: 2px solid #c8a262; border-radius: 10px; padding: 16px 56px; cursor: pointer;
      box-shadow: 0 6px 22px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,235,190,.25);
      transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
    }
    #play-btn:hover {
      transform: translateY(-2px) scale(1.03);
      background: linear-gradient(180deg, rgba(150,110,62,.95), rgba(92,64,34,.97));
      box-shadow: 0 10px 28px rgba(0,0,0,.6), 0 0 18px rgba(200,162,98,.5), inset 0 1px 0 rgba(255,235,190,.3);
    }
    #play-btn:active { transform: translateY(0) scale(.99); }

    #loading { display: none; background: #0a0a0a; }
    .load-img {
      position: absolute; inset: 0; background-size: cover; background-position: center;
      opacity: 0; transition: opacity 1.2s ease;
    }
    .load-img.active { opacity: 1; }
    #loading::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,.2), rgba(0,0,0,.6));
    }
    #loading-content { position: relative; z-index: 2; }
    #loading-text {
      font-family: 'Cinzel', serif; font-size: clamp(16px, 2.2vw, 24px);
      letter-spacing: .25em; text-transform: uppercase; color: #e8d8ad;
      text-shadow: 0 2px 10px rgba(0,0,0,.9);
    }
    #loading-dots { margin-top: 14px; font-family: 'Cinzel', serif; font-size: 22px; color: #c8a262; letter-spacing: .3em; }
    #loading-phase {
      font-family: 'Cinzel', serif; font-size: clamp(11px, 1.4vw, 14px);
      letter-spacing: .2em; text-transform: uppercase; color: #c8a262;
      margin-top: 10px; text-shadow: 0 2px 8px rgba(0,0,0,.9);
    }
    #loading-bar {
      width: clamp(220px, 32vw, 380px); height: 10px; margin: 14px auto 0;
      background: rgba(255,255,255,.12); border: 1px solid #c8a262; border-radius: 6px;
      overflow: hidden; box-shadow: 0 2px 10px rgba(0,0,0,.6);
    }
    #loading-bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #c8a262, #f6e9c6);
      box-shadow: 0 0 12px rgba(246,233,198,.6);
      transition: width .4s ease;
    }
    .hidden { opacity: 0 !important; pointer-events: none; }
  </style>
</head>

<body>
  <canvas id="c"></canvas>
  <div id="status">Loading...</div>

  <!-- MAIN MENU -->
  <div id="menu">
    <h1 id="game-title">Eldermoor</h1>
    <div id="game-subtitle">Chronicles of the Hollow Vale</div>
    <button id="play-btn">Play</button>
  </div>

  <!-- LOADING SCREEN -->
  <div id="loading">
    <div class="load-img" data-src="./loading_images/loading_2.png"></div>
    <div class="load-img" data-src="./loading_images/loading_3.png"></div>
    <div class="load-img" data-src="./loading_images/loading_5.png"></div>
    <div id="loading-content">
      <div id="loading-text">Entering Eldermoor</div>
      <div id="loading-phase">Preparing the world</div>
      <div id="loading-bar"><div id="loading-bar-fill"></div></div>
    </div>
  </div>

  <script type="module" src="main2.js"></script>

  <!-- MENU / LOADING LOGIC -->
  <script>
    (function () {
      const menu    = document.getElementById('menu');
      const loading = document.getElementById('loading');
      const playBtn = document.getElementById('play-btn');
      const imgs    = Array.from(document.querySelectorAll('.load-img'));

      imgs.forEach(el => { el.style.backgroundImage = "url('" + el.dataset.src + "')"; });

      let rotTimer = null, idx = 0;

      function startImageRotation() {
        imgs.forEach((el, i) => el.classList.toggle('active', i === 0));
        idx = 0;
        rotTimer = setInterval(function () {
          imgs[idx].classList.remove('active');
          idx = (idx + 1) % imgs.length;
          imgs[idx].classList.add('active');
        }, 2600);
      }

      // progress bar: driven by main2.js via window.onLoadProgress
      const barFill = document.getElementById('loading-bar-fill');
      const phaseEl = document.getElementById('loading-phase');
      window.onLoadProgress = function (frac, label) {
        const pct = Math.round(Math.max(0, Math.min(1, frac)) * 100);
        barFill.style.width = pct + '%';
        if (label) phaseEl.textContent = label + '  ' + pct + '%';
      };

      function finishLoading() {
        clearInterval(rotTimer);
        loading.classList.add('hidden');
        setTimeout(function () { loading.style.display = 'none'; }, 800);
      }

      window.onSceneReady = function () { finishLoading(); };
      window.onSceneError = function () {
        clearInterval(rotTimer);
        document.getElementById('loading-text').textContent = 'Loading error \u2014 check console';
      };

      playBtn.addEventListener('click', function () {
        menu.classList.add('hidden');
        setTimeout(function () { menu.style.display = 'none'; }, 800);
        loading.style.display = 'flex';
        requestAnimationFrame(startImageRotation);
        if (typeof window.startGame === 'function') {
          window.startGame();
        } else {
          const wait = setInterval(function () {
            if (typeof window.startGame === 'function') { clearInterval(wait); window.startGame(); }
          }, 100);
        }
      });
    })();
  </script>
</body>
</html>
